name: Rust build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: 🎨 Format
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: 🎨 Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: 📎 Clippy
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: 💾 Cache
        uses: Swatinem/rust-cache@v2

      - name: 📎 Run Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Cache
        uses: Swatinem/rust-cache@v2

      - name: 🧪 Run tests
        run: cargo test --all

  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 💾 Cache
        uses: Swatinem/rust-cache@v2

      - name: 🔨 Build
        run: cargo build --all
